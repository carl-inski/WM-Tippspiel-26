# Wrangler-Konfiguration für den Tippspiel-Proxy.
#
# Deployment per Kommandozeile (Alternative zum Dashboard-Editor):
#   cd proxy
#   npx wrangler deploy            # öffnet einmalig den Browser-Login
#   npx wrangler secret put FOOTBALL_DATA_API_KEY   # Key eingeben, Enter
#
# Danach läuft der Worker unter https://wm-tippspiel-proxy.<account>.workers.dev

name = "wm-tippspiel-proxy"
main = "cloudflare-worker.js"
compatibility_date = "2026-01-01"

# Fallback-Zwischenspeicher: letzter guter API-Stand, wird bei Upstream-
# Störung ausgeliefert. Namespace-ID via `npx wrangler kv namespace list`.
[[kv_namespaces]]
binding = "LIVE_CACHE"
id = "74a02606992445459b2c5451b272f6cb"
