<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Färbt die iOS-Safari-Leisten im selben Navy wie der Seitenverlauf, damit
       die Statusleiste (im gescrollten Zustand) und die Toolbar nahtlos in die
       Seite übergehen statt als dunkler Balken zu erscheinen -->
  <meta name="theme-color" content="#14233c">
  <title>WM 2026 · Familien-Tippspiel</title>
  <meta name="description" content="Live-Tipptabelle des Familien-Tippspiels zur WM 2026">
  <link rel="preconnect" href="https://flagcdn.com">
  <link rel="stylesheet" href="css/liquid.css?v=43">
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🏆&lt;/text&gt;&lt;/svg&gt;">
</head>
<body>
  <div class="bg-blobs" aria-hidden="true">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div id="scroll" class="page-scroll">
  <header class="glass topbar">
    <div class="topbar-title">
      <h1><span class="icon-bubble" id="title-icon"></span> WM 2026 <span>Familien-Tippspiel</span></h1>
    </div>
    <div class="topbar-status">
      <span id="live-dot" class="status-dot offline" title="Live-Status"></span>
      <span id="status-text">lädt …</span>
    </div>
  </header>

  <main id="app">
    <section id="view-spiele" class="view"></section>
    <section id="view-tabelle" class="view" hidden></section>
    <section id="view-familien" class="view" hidden></section>
    <section id="view-torjaeger" class="view" hidden></section>
  </main>

  <div id="sheet-backdrop" class="sheet-backdrop" hidden>
    <div id="sheet" class="glass sheet" role="dialog" aria-modal="true"></div>
  </div>

  <footer>
    <p id="footer-info">Wertung: exakt = Wert × 1,5 · Tendenz = Wert × 1 · Zusatzfragen: Weltmeister 15 P., Torjäger 3 P./Tor, Elferschießen +10/−2×Δ</p>
    <p id="footer-source"></p>
    <p id="footer-meta"><span id="footer-version"></span> · Made with 🤖 by <a href="https://carldobmeier.de" target="_blank" rel="noopener">Carl Dobmeier</a></p>
  </footer>
  </div><!-- /page-scroll -->

  <nav class="glass segmented" id="tabs" role="tablist">
    <span class="seg-indicator" id="seg-indicator" aria-hidden="true"></span>
    <button class="seg-btn active" data-tab="spiele" role="tab" aria-selected="true" data-icon="calendar">Spiele</button>
    <button class="seg-btn" data-tab="tabelle" role="tab" aria-selected="false" data-icon="chart">Einzelwertung</button>
    <button class="seg-btn" data-tab="familien" role="tab" aria-selected="false" data-icon="users">Familien</button>
    <button class="seg-btn" data-tab="torjaeger" role="tab" aria-selected="false" data-icon="ball">Torschützen</button>
  </nav>

  <script src="js/icons.js?v=43"></script>
  <script src="js/config.js?v=43"></script>
  <script src="js/teams.js?v=43"></script>
  <script src="js/scoring.js?v=43"></script>
  <script src="js/api.js?v=43"></script>
  <script src="js/main.js?v=43"></script>

  <!-- Cloudflare Web Analytics (datenschutzfreundlich, ohne Cookies) -->
  <script defer src='https://static.cloudflareinsights.com/beacon.min.js' data-cf-beacon='{"token": "5a9e55a0723147cd8dc5104bf343b288"}'></script>
  <!-- End Cloudflare Web Analytics -->
</body>
</html>
