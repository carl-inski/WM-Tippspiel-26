name: Refresh scorers

# Aktualisiert data/scorers.json (Torschützenliste der Web-App) alle 3 Stunden.
# Quellen: fussballdaten.de (Führende) + football-data.org via Worker (kompletter
# Rest). Beide frei & schlüssellos – KEIN Secret nötig.

on:
  schedule:
    - cron: '5 */3 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-scorers
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Torschützenliste bauen
        run: node tools/build-scorers.js
      - name: Bei Änderung committen
        run: |
          if ! git diff --quiet -- data/scorers.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/scorers.json
            git commit -m "data: refresh scorers (fussballdaten + football-data)"
            git push
          else
            echo "Keine Änderung."
          fi
