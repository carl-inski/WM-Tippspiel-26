name: Refresh data

# Aktualisiert alle ~10 Min (frei & schlüssellos, KEIN Secret nötig):
#  - data/scorers.json         Torschützenliste (fussballdaten + football-data)
#  - data/penalty-results.json korrekte Elfer-Endstände (fussballdaten "n.E.")
# Hinweis: GitHubs Cron ist "best effort" und kann sich verzögern.

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: refresh-scorers
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Torschützenliste bauen
        run: node tools/build-scorers.js
      - name: Elfer-Endstände bauen
        run: node tools/build-penalties.js
      - name: Bei Änderung committen
        run: |
          if ! git diff --quiet -- data/scorers.json data/penalty-results.json; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add data/scorers.json data/penalty-results.json
            git commit -m "data: refresh scorers + penalty results"
            git push
          else
            echo "Keine Änderung."
          fi
